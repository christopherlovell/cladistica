<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cladistica</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <header>
    <h1>Cladistica</h1>
    <div class="controls">
      <div class="search-wrapper">
        <input type="text" id="search" placeholder="Search taxa..." autocomplete="off" />
        <ul id="search-results"></ul>
      </div>
      <div class="tree-controls">
        <button id="btn-collapse-all" title="Collapse all branches">Collapse all</button>
        <button id="btn-expand-all" title="Expand all branches">Expand all</button>
      </div>
      <div class="view-toggle">
        <button id="btn-radial" title="Radial view">Radial</button>
        <button id="btn-rectangular" class="active" title="Rectangular view">Rectangular</button>
      </div>
    </div>
  </header>
  <main>
    <div id="viz"></div>
    <aside id="detail-panel" class="hidden">
      <button id="detail-close" aria-label="Close">&times;</button>
      <h2 id="detail-name"></h2>
      <div id="detail-rank" class="detail-badge"></div>
      <p id="detail-description"></p>
      <dl id="detail-meta"></dl>
    </aside>
  </main>
  <div id="tooltip"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
